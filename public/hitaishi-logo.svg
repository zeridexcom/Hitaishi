<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Hitaishi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b6445"/>
      <stop offset="100%" stop-color="#2f7d5c"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7faf5"/>
      <stop offset="100%" stop-color="#d9ebe2"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <g transform="translate(31, 56)" fill="none" stroke="url(#mark)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer Shield / Peak Combo -->
    <path d="M 200 50 L 100 150 L 100 240 C 100 300, 150 345, 200 350 C 250 345, 300 300, 300 240 L 300 150 Z" 
          stroke-width="22" />

    <!-- Inner Shield / Peak Combo -->
    <path d="M 200 92 L 130 162 L 130 240 C 130 280, 165 315, 200 320 C 235 315, 270 280, 270 240 L 270 162 L 200 92" 
          stroke-width="16" />

    <!-- Person Head (circle) -->
    <circle cx="200" cy="180" r="16" fill="url(#mark)" stroke="none" />

    <!-- Body & Rising Arrow Shaft -->
    <path d="M 200 210 C 170 210, 160 235, 160 260 C 160 290, 185 300, 200 300 C 220 300, 255 285, 335 150" 
          stroke-width="22" />

    <!-- Arrow Head -->
    <path d="M 350 135 L 315 140 L 345 170 Z" 
          fill="url(#mark)" stroke="none" />
  </g>
</svg>
